name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-package:
    name: Python 3.12 / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python
        run: uv python install 3.12

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy strict
        run: uv run mypy src

      - name: Tests
        run: uv run pytest -q

      - name: Protocol contract
        run: uv run python scripts/gen_protocol_doc.py --check

      - name: Build wheel and sdist
        run: uv build

      - name: Installed-wheel smoke
        run: uv run python scripts/smoke_wheel.py dist

      - uses: actions/upload-artifact@v4
        with:
          name: kyleclaude-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
